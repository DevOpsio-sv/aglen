name: CI

on:
  push:
  pull_request:

jobs:
  audit-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run i18n audit
        run: npm run i18n:audit

      - name: Build
        run: npm run build
